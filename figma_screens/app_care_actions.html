<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>app_care_actions</title><link rel="stylesheet" href="shared.css"><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script></head>
<body><main class="app_frame" id="app_care_actions">
  <section class="top_player"><div style="font-size:12px">Aktionsdeck</div><div class="subtitle">Pflege & Eingriffe</div></section>
  <h1 class="header_title">Care / Actions</h1>
  <section class="section_card" style="top:156px;height:248px"><h2 class="section_head">Pflegeaktionen</h2>
    <div class="row"><span>Gießen</span><span class="value_green">+Wasser</span></div>
    <div class="row"><span>Düngen</span><span class="value_gold">+Nährstoffe</span></div>
    <div class="row"><span>pH korrigieren</span><span class="subtitle">Feinjustage</span></div>
    <div class="row"><span>Luftstrom erhöhen</span><span class="subtitle">Stress ↓</span></div>
    <div class="row"><span>Umtopfen</span><span class="badge">Bedingt</span></div>
  </section>
  <section class="section_card" style="top:416px;height:186px"><h2 class="section_head">Zeitaktionen</h2>
    <div class="row"><span>-30m Eventzeit</span><span class="value_gold">x1</span></div>
    <div class="row"><span>Nacht überspringen</span><span class="subtitle">Nur nachts</span></div>
    <div class="row"><span>Simulation pausieren</span><span class="subtitle">Sicher</span></div></section>
  <section class="action_bar"><div class="action"><span class="label">Pflege</span></div><div class="action"><span class="label">Analyse</span></div><div class="action"><span class="label">Boost</span></div></section>
</main></body></html>
