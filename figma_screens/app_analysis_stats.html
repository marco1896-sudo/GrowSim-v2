<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>app_analysis_stats</title><link rel="stylesheet" href="shared.css"><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script></head>
<body><main class="app_frame" id="app_analysis_stats">
  <section class="top_player"><div style="font-size:12px">Analysezentrum</div><div class="subtitle">Live-Metriken</div></section>
  <h1 class="header_title">Analysis / Stats</h1>
  <section class="section_card" style="top:156px;height:206px"><h2 class="section_head">Pflanzenstatus</h2>
    <div class="row"><span>Wasser</span><span class="value_gold">70%</span></div>
    <div class="row"><span>Nährstoffe</span><span class="value_gold">65%</span></div>
    <div class="row"><span>Wachstum</span><span class="value_green">2.6%</span></div>
    <div class="row"><span>Risiko</span><span style="color:#ff6b35;font-weight:700">20%</span></div>
    <div class="row"><span>Stress</span><span class="value_gold">15%</span></div>
  </section>
  <section class="section_card" style="top:374px;height:180px"><h2 class="section_head">Wurzeln & Boden</h2>
    <div class="row"><span>pH</span><span class="value_green">5.9</span></div>
    <div class="row"><span>EC</span><span class="value_green">1.3 mS</span></div>
    <div class="row"><span>Wurzelgesundheit</span><span class="value_green">20%</span></div>
    <div class="row"><span>Sauerstoff</span><span class="value_green">78%</span></div>
  </section>
  <section class="section_card" style="top:566px;height:118px"><h2 class="section_head">Trend</h2><div class="subtitle">48h Verlauf: Wasser stabil, Risiko leicht steigend, Stress fallend.</div></section>
  <section class="action_bar"><div class="action"><span class="label">Report</span></div><div class="action"><span class="label">Filter</span></div><div class="action"><span class="label">Export</span></div></section>
</main></body></html>
