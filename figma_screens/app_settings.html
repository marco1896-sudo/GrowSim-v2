<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>app_settings</title><link rel="stylesheet" href="shared.css"><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script></head>
<body><main class="app_frame" id="app_settings">
  <section class="top_player"><div style="font-size:12px">System</div><div class="subtitle">Simulationseinstellungen</div></section>
  <h1 class="header_title">Settings</h1>
  <section class="section_card" style="top:156px;height:220px"><h2 class="section_head">Gameplay</h2>
    <div class="row"><span>Simulationstempo</span><span class="value_gold">1.0x</span></div>
    <div class="row"><span>Event-Häufigkeit</span><span class="subtitle">Normal</span></div>
    <div class="row"><span>Tutorial Hinweise</span><span class="value_green">An</span></div>
    <div class="row"><span>Auto Save</span><span class="value_green">Alle 5m</span></div></section>
  <section class="section_card" style="top:388px;height:186px"><h2 class="section_head">Audio & Grafik</h2>
    <div class="row"><span>Master Lautstärke</span><span class="value_gold">84%</span></div>
    <div class="row"><span>Effekte</span><span class="subtitle">Hoch</span></div>
    <div class="row"><span>Batterie-Modus</span><span class="subtitle">Aus</span></div>
    <div class="row"><span>Haptik</span><span class="value_green">An</span></div></section>
  <section class="section_card" style="top:586px;height:98px"><h2 class="section_head">Account</h2><div class="row"><span>Cloud Sync</span><span class="value_green">Verbunden</span></div><div class="row"><span>Support</span><span>›</span></div></section>
  <section class="action_bar"><div class="action"><span class="label">Reset</span></div><div class="action"><span class="label">Default</span></div><div class="action"><span class="label">Save</span></div></section>
</main></body></html>
